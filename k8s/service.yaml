---
apiVersion: v1
kind: Service
metadata:
  name: product-reliability-app
  namespace: product-reliability
  labels:
    app: product-reliability-app
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: product-reliability-app
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: product-reliability-app-headless
  namespace: product-reliability
  labels:
    app: product-reliability-app
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: product-reliability-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: product-reliability-app-nodeport
  namespace: product-reliability
  labels:
    app: product-reliability-app
spec:
  type: NodePort
  selector:
    app: product-reliability-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
